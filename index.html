<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lusk</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cousine:ital,wght@0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:       #0e0e0e;
    --panel:    #141414;
    --border:   #2a2a2a;
    --text:     #d4c9a8;
    --dim:      #7a7060;
    --bright:   #f0e6c8;
    --cyan:     #7ecac3;
    --gold:     #c8a850;
    --red:      #c86050;
    --green:    #80b878;
    --room:     #e8dfc0;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Cousine', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.5;
  }

  #wrapper {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 960px;
    margin: 0 auto;
    padding: 0;
  }

  #topbar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  #topbar .title {
    color: var(--gold);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  #topbar .status-right {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  #topbar .time-display {
    color: var(--dim);
    font-size: 12px;
  }

  #topbar .weather-display {
    color: var(--dim);
    font-size: 12px;
    font-style: italic;
  }

  #topbar .location-display {
    color: var(--cyan);
    font-size: 12px;
  }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    scroll-behavior: smooth;
  }

  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-track { background: var(--bg); }
  #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg { margin-bottom: 4px; }
  .msg-room-title  { color: var(--gold);   font-weight: 700; margin-top: 10px; margin-bottom: 2px; }
  .msg-room-desc   { color: var(--room);   margin-bottom: 4px; }
  .msg-weather     { color: var(--dim);    font-style: italic; margin-bottom: 4px; }
  .msg-item        { color: var(--cyan);   margin-bottom: 2px; }
  .msg-exits       { color: var(--green);  margin-bottom: 2px; }
  .msg-exit-detail { color: var(--dim);    padding-left: 16px; }
  .msg-system      { color: var(--dim);    font-style: italic; }
  .msg-error       { color: var(--red); }
  .msg-echo        { color: var(--dim); }
  .msg-separator   { color: var(--border); user-select: none; margin: 6px 0; }

  #inputbar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 8px 16px;
    gap: 8px;
    flex-shrink: 0;
  }

  #inputbar .prompt { color: var(--gold); font-weight: 700; flex-shrink: 0; }

  #cmdinput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--bright);
    font-family: inherit;
    font-size: 14px;
    caret-color: var(--gold);
  }

  #cmdinput::placeholder { color: var(--border); }
</style>
</head>
<body>

<div id="wrapper">
  <div id="topbar">
    <span class="title">&#9670; Lusk</span>
    <div class="status-right">
      <span class="time-display" id="time-display"></span>
      <span class="weather-display" id="weather-display"></span>
      <span class="location-display" id="location-display"></span>
    </div>
  </div>
  <div id="output"></div>
  <div id="inputbar">
    <span class="prompt">&gt;</span>
    <input type="text" id="cmdinput" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="enter command..." />
  </div>
</div>

<script src="rooms.js"></script>
<script src="items.js"></script>

<script>
// =============================================================================
// SPAWN ROOMS
// =============================================================================
const SPAWN_ROOMS = [
  "the_bronze_anchor",
  "carnaby_market_square",
  "canal_steps",
  "wayfarers_garden",
  "harbour_promenade",
  "copper_lane",
  "temple_row_main",
  "embassy_row",
  "old_pier",
  "provisions_yard"
];

// =============================================================================
// DISTRICTS
// =============================================================================
const DISTRICTS = {
  heights:     { label: "The Heights"             },
  rooftops:    { label: "The Rooftops"            },
  government:  { label: "Government District"     },
  residency:   { label: "The Residency"           },
  temples:     { label: "Temple District"         },
  carnaby:     { label: "Carnaby Market"          },
  old_quarter: { label: "The Old Quarter"         },
  harbour:     { label: "The Harbour"             },
  sewers:      { label: "The Sewers & Underworks" }
};

const DISTRICT_ORDER = [
  "heights", "rooftops", "government", "residency",
  "temples", "carnaby", "old_quarter", "harbour", "sewers"
];

// =============================================================================
// TIME & WEATHER
// 1 tick = 30 seconds real time = 1 in-game hour
// Full day = 24 ticks = 12 real minutes
// =============================================================================

const TICK_MS = 30000;

const TIME_PERIODS = [
  { name: "deep night",  hours: [0, 1, 2, 3] },
  { name: "before dawn", hours: [4, 5] },
  { name: "dawn",        hours: [6] },
  { name: "morning",     hours: [7, 8, 9] },
  { name: "midday",      hours: [10, 11, 12] },
  { name: "afternoon",   hours: [13, 14, 15, 16] },
  { name: "dusk",        hours: [17, 18] },
  { name: "evening",     hours: [19, 20, 21] },
  { name: "night",       hours: [22, 23] }
];

const WEATHER_STATES = {
  clear: {
    label: "clear",
    weight: 35,
    flavour: {
      "deep night":   "The sky is clear and black, stars thick from horizon to horizon. The sea reflects them faintly.",
      "before dawn":  "The sky is still dark but the stars are thinning at the eastern edge.",
      "dawn":         "Clear dawn. The harbour turns gold from the east, the water bright.",
      "morning":      "A clear morning. The light is sharp and the sea is a hard blue.",
      "midday":       "Clear and bright. Shadows are short. The white stones of the Heights are almost painful to look at.",
      "afternoon":    "Clear afternoon, the light turning amber. The sea glitters to the south.",
      "dusk":         "A clear dusk. The western sky over the headland goes orange, then red, then a deep violet.",
      "evening":      "Clear evening, the first stars appearing over the harbour mouth.",
      "night":        "Clear night. The stars are out. A half-moon lays a broken path across the water."
    }
  },
  overcast: {
    label: "overcast",
    weight: 25,
    flavour: {
      "deep night":   "Thick clouds. No stars, no moon. The darkness is complete except for the harbour lanterns.",
      "before dawn":  "The sky is a uniform grey, lightening only slightly toward the east.",
      "dawn":         "An overcast dawn. The light arrives without drama, grey and even.",
      "morning":      "Overcast. The light is flat and directionless. The sea is the colour of pewter.",
      "midday":       "Heavy cloud cover. The city feels slightly muffled, colours duller than usual.",
      "afternoon":    "Still overcast. A faint smell of rain that hasn't arrived yet.",
      "dusk":         "The clouds swallow the sunset. Dusk arrives as a general dimming.",
      "evening":      "A grey evening. The lamps are lit earlier than usual.",
      "night":        "Overcast. The lanterns cast small circles of warm light in the general dark."
    }
  },
  light_rain: {
    label: "light rain",
    weight: 20,
    flavour: {
      "deep night":   "Light rain falls steadily in the darkness. The harbour stones shine wet.",
      "before dawn":  "Rain before dawn. The gutters run quietly. The city smells of wet stone.",
      "dawn":         "Raining at dawn. The light is grey and diffuse, the harbour blurred.",
      "morning":      "Light rain. People move with purpose, hoods up. The market awnings drip.",
      "midday":       "A steady light rain. The square empties slightly. The smell of wet canvas.",
      "afternoon":    "Rain continues through the afternoon. Soft and persistent.",
      "dusk":         "Still raining at dusk. The lights of the city are haloed in the wet air.",
      "evening":      "Light rain in the evening. The cobblestones shine. The taverns are full.",
      "night":        "Soft rain in the night. The sound of it on the water is constant and quiet."
    }
  },
  heavy_rain: {
    label: "heavy rain",
    weight: 10,
    flavour: {
      "deep night":   "Heavy rain hammers the rooftops. The gutters overflow. The harbour is loud with it.",
      "before dawn":  "Hard rain before dawn. The streets run like rivers. Thunder somewhere out to sea.",
      "dawn":         "Dawn under heavy rain. Everything is noise and grey movement.",
      "morning":      "Heavy rain this morning. Most of the market stalls are shuttered or covered. The streets are half empty.",
      "midday":       "The rain is heavy and shows no sign of stopping. Midday feels like late afternoon.",
      "afternoon":    "Sustained heavy rain. The canals are running high. Water drips through old roofs.",
      "dusk":         "Heavy rain at dusk. Visibility is poor. The harbour lights are smears in the wet.",
      "evening":      "A rough evening. The rain is hard and the wind has come up. The taverns are packed.",
      "night":        "A stormy night. The rain is loud on every surface. The harbour is rough."
    }
  },
  fog: {
    label: "fog",
    weight: 8,
    flavour: {
      "deep night":   "Thick fog. The harbour lanterns are invisible from two streets away. The foghorn sounds.",
      "before dawn":  "Dense fog before dawn. The city is reduced to sounds and shapes.",
      "dawn":         "Fog at dawn. The light arrives as a general brightening with no clear source.",
      "morning":      "Morning fog lies heavy over the harbour. The ships are shapes in grey. The foghorn sounds at intervals.",
      "midday":       "The fog hasn't lifted. Sound carries strangely. You can hear conversations you can't see.",
      "afternoon":    "Still foggy. The afternoon light is dim and directionless.",
      "dusk":         "Fog and dusk together. The city disappears in layers.",
      "evening":      "A foggy evening. The lamp-lighters are busy. The streets are quieter than usual.",
      "night":        "Dense night fog. The harbour is completely invisible. The foghorn is a constant presence."
    }
  },
  storm: {
    label: "storm",
    weight: 2,
    flavour: {
      "deep night":   "A full storm. Lightning over the open water. The harbour chains strain. The city hunkers down.",
      "before dawn":  "The storm is at its worst before dawn. The wind is loud in every chimney.",
      "dawn":         "Storm at dawn. No sunrise — just a gradual lightening of the violent sky.",
      "morning":      "A storm this morning. Most people are indoors. The harbour is closed to departures.",
      "midday":       "The storm shows no sign of breaking. Midday is dark as evening.",
      "afternoon":    "Storm through the afternoon. Slates off roofs. The canals are dangerously high.",
      "dusk":         "Storm at dusk. The sky is extraordinary — black and green and white.",
      "evening":      "The storm rages into the evening. The Bronze Anchor is standing room only.",
      "night":        "A full night storm. Lightning counts the seconds. The sea is loud from everywhere in the city."
    }
  }
};

const WEATHER_TRANSITIONS = {
  clear:       [["clear", 50], ["overcast", 35], ["light_rain", 10], ["fog", 5]],
  overcast:    [["overcast", 30], ["light_rain", 30], ["clear", 20], ["heavy_rain", 15], ["fog", 5]],
  light_rain:  [["light_rain", 35], ["overcast", 30], ["heavy_rain", 20], ["clear", 15]],
  heavy_rain:  [["heavy_rain", 40], ["light_rain", 35], ["storm", 15], ["overcast", 10]],
  fog:         [["fog", 40], ["overcast", 35], ["clear", 20], ["light_rain", 5]],
  storm:       [["storm", 30], ["heavy_rain", 50], ["overcast", 20]]
};

const WEATHER_CHECK_INTERVAL = 4; // check for weather change every 4 game-hours

let gameHour       = Math.floor(Math.random() * 24);
let currentWeather = "clear";
let tickCount      = 0;
let currentRoom    = null;

function getTimePeriod(hour) {
  for (const p of TIME_PERIODS) {
    if (p.hours.includes(hour)) return p.name;
  }
  return "night";
}

function formatHour(hour) {
  const h = hour % 12 || 12;
  const ampm = hour < 12 ? "am" : "pm";
  return h + ampm;
}

function weatherFlavour() {
  const period = getTimePeriod(gameHour);
  const w = WEATHER_STATES[currentWeather];
  return w.flavour[period] || w.flavour["night"];
}

function updateTopbar() {
  document.getElementById("time-display").textContent =
    formatHour(gameHour) + "  ·  " + getTimePeriod(gameHour);
  document.getElementById("weather-display").textContent =
    WEATHER_STATES[currentWeather].label;
}

function weightedRandom(table) {
  const total = table.reduce((s, [, w]) => s + w, 0);
  let r = Math.random() * total;
  for (const [key, w] of table) {
    r -= w;
    if (r <= 0) return key;
  }
  return table[table.length - 1][0];
}

function advanceWeather() {
  const next = weightedRandom(WEATHER_TRANSITIONS[currentWeather]);
  if (next !== currentWeather) {
    currentWeather = next;
    return true;
  }
  return false;
}

function onTick() {
  const prevPeriod  = getTimePeriod(gameHour);
  gameHour  = (gameHour + 1) % 24;
  tickCount++;

  const newPeriod    = getTimePeriod(gameHour);
  let weatherChanged = false;

  if (tickCount % WEATHER_CHECK_INTERVAL === 0) {
    weatherChanged = advanceWeather();
  }

  updateTopbar();

  if (newPeriod !== prevPeriod) {
    const cap = newPeriod.charAt(0).toUpperCase() + newPeriod.slice(1);
    print("  " + cap + ".", "msg-system");
  }
  if (weatherChanged) {
    print("  " + weatherFlavour(), "msg-weather");
  }
}

// =============================================================================
// ITEM STATE
// itemLocations maps item id -> room id (or "inventory")
// Initialised from ITEMS at game start.
// =============================================================================
let itemLocations = {};
let playerInventory = []; // ordered list of item ids in player's possession

function initItems() {
  for (const [id, item] of Object.entries(ITEMS)) {
    itemLocations[id] = item.room;
  }
}

function itemsInRoom(roomId) {
  return Object.keys(itemLocations).filter(id => itemLocations[id] === roomId);
}

function itemsInInventory() {
  return Object.keys(itemLocations).filter(id => itemLocations[id] === "inventory");
}

// Find item by partial name match — checks inventory first, then current room
function findItem(query, scope) {
  // scope: "room", "inventory", "either"
  const q = query.toLowerCase().trim();
  const candidates = Object.entries(ITEMS).filter(([id]) => {
    if (scope === "room")      return itemLocations[id] === currentRoom;
    if (scope === "inventory") return itemLocations[id] === "inventory";
    return itemLocations[id] === currentRoom || itemLocations[id] === "inventory";
  });
  // exact match first
  let found = candidates.find(([, item]) => item.name.toLowerCase() === q);
  if (!found) found = candidates.find(([, item]) => item.name.toLowerCase().includes(q));
  if (!found) found = candidates.find(([id]) => id.toLowerCase().includes(q));
  return found || null; // [id, item] or null
}

function printRoomItems(roomId) {
  const ids = itemsInRoom(roomId);
  for (const id of ids) {
    print("  " + ITEMS[id].roomDesc, "msg-item");
  }
}

function cmdTake(query) {
  if (!query) { print("Take what?", "msg-error"); return; }
  const found = findItem(query, "room");
  if (!found) { print("You don't see that here.", "msg-error"); return; }
  const [id, item] = found;
  if (item.fixed) {
    print(item.fixedMsg || "You can't take that.", "msg-error");
    return;
  }
  itemLocations[id] = "inventory";
  print("You take " + item.name + ".", "msg-system");
}

function cmdDrop(query) {
  if (!query) { print("Drop what?", "msg-error"); return; }
  const found = findItem(query, "inventory");
  if (!found) { print("You're not carrying that.", "msg-error"); return; }
  const [id, item] = found;
  itemLocations[id] = currentRoom;
  print("You drop " + item.name + ".", "msg-system");
}

function cmdInventory() {
  const carrying = itemsInInventory();
  separator();
  print("INVENTORY", "msg-room-title");
  if (carrying.length === 0) {
    print("  You are carrying nothing.", "msg-exit-detail");
  } else {
    for (const id of carrying) {
      print("  " + ITEMS[id].name, "msg-exit-detail");
    }
  }
}

function cmdExamine(query) {
  if (!query) { print("Examine what?", "msg-error"); return; }
  const found = findItem(query, "either");
  if (!found) {
    // also check fixed items in room even if not in candidates
    const roomFound = findItem(query, "room");
    if (!roomFound) { print("You don't see that here.", "msg-error"); return; }
  }
  const [, item] = found || findItem(query, "room");
  separator();
  print(item.name.charAt(0).toUpperCase() + item.name.slice(1), "msg-room-title");
  print(item.examineDesc, "msg-room-desc");
}



const DIR_ALIASES = {
  "n": "n", "north": "n",
  "s": "s", "south": "s",
  "e": "e", "east":  "e",
  "w": "w", "west":  "w",
  "u": "u", "up":    "u",
  "d": "d", "down":  "d"
};

const DIR_LABELS = {
  "n": "North", "s": "South",
  "e": "East",  "w": "West",
  "u": "Up",    "d": "Down"
};

const output  = document.getElementById("output");
const input   = document.getElementById("cmdinput");
const locDisp = document.getElementById("location-display");

function randomFrom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function print(text, cls) {
  const el = document.createElement("div");
  el.className = "msg " + (cls || "");
  el.textContent = text;
  output.appendChild(el);
  output.scrollTop = output.scrollHeight;
}

function separator() {
  print("─────────────────────────────────────────────────", "msg-separator");
}

function showRoom(room) {
  separator();
  print(room.name, "msg-room-title");
  print(room.desc, "msg-room-desc");
  if (!room.indoor) {
    print(weatherFlavour(), "msg-weather");
  }
  printRoomItems(currentRoom);
  showExitsDetail(room);
}

function showExitsDetail(room) {
  const dirs = Object.keys(room.exits);
  if (dirs.length === 0) { print("There are no obvious exits.", "msg-exits"); return; }
  print("Exits:", "msg-exits");
  for (const dir of dirs) {
    print("  " + DIR_LABELS[dir].toUpperCase() + " — " + room.exits[dir].desc, "msg-exit-detail");
  }
}

function showMap(districtKey) {
  const currentDistrict = ROOMS[currentRoom] ? ROOMS[currentRoom].district : null;

  if (districtKey) {
    const normalised = districtKey.replace(/\s+/g, "_").toLowerCase();
    const matchedKey = DISTRICT_ORDER.find(k =>
      k === normalised ||
      DISTRICTS[k].label.toLowerCase().replace(/\s+/g, "_") === normalised
    );
    if (!matchedKey) {
      print("Unknown district. Type MAP to see all districts.", "msg-error");
      return;
    }
    const d = DISTRICTS[matchedKey];
    separator();
    print(d.label.toUpperCase(), "msg-room-title");
    const rooms = Object.entries(ROOMS).filter(([, r]) => r.district === matchedKey);
    if (rooms.length === 0) {
      print("  No rooms found in this district.", "msg-exit-detail");
      return;
    }
    for (const [id, r] of rooms) {
      const isHere = id === currentRoom;
      print("  " + (isHere ? "* " : "  ") + r.name, isHere ? "msg-exits" : "msg-exit-detail");
    }
    return;
  }

  separator();
  print("LUSK — DISTRICTS", "msg-room-title");
  print("Type MAP [district name] to see rooms within it.", "msg-system");
  for (const key of DISTRICT_ORDER) {
    const d = DISTRICTS[key];
    const isHere = key === currentDistrict;
    print("  " + (isHere ? "* " : "  ") + d.label, isHere ? "msg-exits" : "msg-exit-detail");
  }
}

function move(dir) {
  const room = ROOMS[currentRoom];
  if (!room.exits[dir]) { print("You cannot go that way.", "msg-error"); return; }
  const dest = room.exits[dir].to;
  if (!ROOMS[dest]) { print("That path leads nowhere yet.", "msg-error"); return; }
  currentRoom = dest;
  locDisp.textContent = ROOMS[currentRoom].name;
  showRoom(ROOMS[currentRoom]);
}

function handleCommand(raw) {
  const cmd = raw.trim().toLowerCase();
  if (!cmd) return;
  print("> " + raw, "msg-echo");

  if (DIR_ALIASES[cmd] !== undefined) { move(DIR_ALIASES[cmd]); return; }

  // look / look [direction]
  if (cmd === "look" || cmd === "l") { showRoom(ROOMS[currentRoom]); return; }
  if (cmd.startsWith("look ") || cmd.startsWith("l ")) {
    const dirRaw = cmd.startsWith("look ") ? cmd.slice(5).trim() : cmd.slice(2).trim();
    const dir = DIR_ALIASES[dirRaw];
    if (!dir) { print("That's not a direction.", "msg-error"); return; }
    const room = ROOMS[currentRoom];
    if (!room.exits[dir]) { print("There is nothing that way.", "msg-error"); return; }
    print(room.exits[dir].desc, "msg-room-desc");
    return;
  }

  if (cmd === "map" || cmd.startsWith("map ")) {
    const arg = cmd.startsWith("map ") ? cmd.slice(4).trim() : null;
    showMap(arg);
    return;
  }

  if (cmd === "exits" || cmd === "exit") { showExitsDetail(ROOMS[currentRoom]); return; }

  if (cmd === "time") {
    separator();
    print("TIME & WEATHER", "msg-room-title");
    print("  " + formatHour(gameHour) + " — " + getTimePeriod(gameHour), "msg-exit-detail");
    print("  " + WEATHER_STATES[currentWeather].label, "msg-exit-detail");
    print("  " + weatherFlavour(), "msg-weather");
    return;
  }

  // inventory
  if (cmd === "inventory" || cmd === "i") { cmdInventory(); return; }

  // take
  if (cmd.startsWith("take ") || cmd.startsWith("get ") || cmd.startsWith("pick up ")) {
    const q = cmd.startsWith("pick up ") ? cmd.slice(8) : cmd.startsWith("take ") ? cmd.slice(5) : cmd.slice(4);
    cmdTake(q.trim());
    return;
  }

  // drop
  if (cmd.startsWith("drop ") || cmd.startsWith("put down ")) {
    const q = cmd.startsWith("put down ") ? cmd.slice(9) : cmd.slice(5);
    cmdDrop(q.trim());
    return;
  }

  // examine
  if (cmd.startsWith("examine ") || cmd.startsWith("x ") || cmd.startsWith("look at ")) {
    const q = cmd.startsWith("examine ") ? cmd.slice(8) : cmd.startsWith("x ") ? cmd.slice(2) : cmd.slice(8);
    cmdExamine(q.trim());
    return;
  }

  if (cmd === "help" || cmd === "?" || cmd === "commands") {
    separator();
    print("COMMANDS", "msg-room-title");
    print("  north / n          move north",               "msg-exit-detail");
    print("  south / s          move south",               "msg-exit-detail");
    print("  east  / e          move east",                "msg-exit-detail");
    print("  west  / w          move west",                "msg-exit-detail");
    print("  up    / u          move up",                  "msg-exit-detail");
    print("  down  / d          move down",                "msg-exit-detail");
    print("  look / l           look around",              "msg-exit-detail");
    print("  look [direction]   look in a direction",      "msg-exit-detail");
    print("  exits              list exits",               "msg-exit-detail");
    print("  time               time and weather",         "msg-exit-detail");
    print("  inventory / i      show carried items",       "msg-exit-detail");
    print("  take [item]        pick up an item",          "msg-exit-detail");
    print("  drop [item]        drop an item",             "msg-exit-detail");
    print("  examine [item]     examine an item",          "msg-exit-detail");
    print("  map                list districts",           "msg-exit-detail");
    print("  map [district]     rooms in district",        "msg-exit-detail");
    return;
  }

  print("Unknown command. Type HELP for a list of commands.", "msg-error");
}

function init() {
  const weatherTable = Object.entries(WEATHER_STATES).map(([k, v]) => [k, v.weight]);
  currentWeather = weightedRandom(weatherTable);
  currentRoom    = randomFrom(SPAWN_ROOMS);
  initItems();
  locDisp.textContent = ROOMS[currentRoom].name;
  updateTopbar();

  separator();
  print("LUSK", "msg-room-title");
  print("An island city. You are a stranger here.", "msg-room-desc");
  print("Type HELP for commands.", "msg-system");
  showRoom(ROOMS[currentRoom]);
  input.focus();

  setInterval(onTick, TICK_MS);
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const val = input.value;
    input.value = "";
    handleCommand(val);
  }
});

document.addEventListener("click", () => input.focus());

init();
</script>
</body>
</html>
