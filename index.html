<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lusk</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cousine:ital,wght@0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:       #0e0e0e;
    --panel:    #141414;
    --border:   #2a2a2a;
    --text:     #d4c9a8;
    --dim:      #7a7060;
    --bright:   #f0e6c8;
    --cyan:     #7ecac3;
    --gold:     #c8a850;
    --red:      #c86050;
    --green:    #80b878;
    --room:     #e8dfc0;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Cousine', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.5;
  }

  #wrapper {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 960px;
    margin: 0 auto;
    padding: 0;
  }

  #topbar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  #topbar .title {
    color: var(--gold);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  #topbar .location-display {
    color: var(--cyan);
    font-size: 12px;
  }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    scroll-behavior: smooth;
  }

  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-track { background: var(--bg); }
  #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg { margin-bottom: 4px; }
  .msg-room-title  { color: var(--gold);   font-weight: 700; margin-top: 10px; margin-bottom: 2px; }
  .msg-room-desc   { color: var(--room);   margin-bottom: 4px; }
  .msg-exits       { color: var(--green);  margin-bottom: 2px; }
  .msg-exit-detail { color: var(--dim);    padding-left: 16px; }
  .msg-system      { color: var(--dim);    font-style: italic; }
  .msg-error       { color: var(--red); }
  .msg-echo        { color: var(--dim); }
  .msg-separator   { color: var(--border); user-select: none; margin: 6px 0; }

  #inputbar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 8px 16px;
    gap: 8px;
    flex-shrink: 0;
  }

  #inputbar .prompt { color: var(--gold); font-weight: 700; flex-shrink: 0; }

  #cmdinput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--bright);
    font-family: inherit;
    font-size: 14px;
    caret-color: var(--gold);
  }

  #cmdinput::placeholder { color: var(--border); }
</style>
</head>
<body>

<div id="wrapper">
  <div id="topbar">
    <span class="title">&#9670; Lusk</span>
    <span class="location-display" id="location-display"></span>
  </div>
  <div id="output"></div>
  <div id="inputbar">
    <span class="prompt">&gt;</span>
    <input type="text" id="cmdinput" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="enter command..." />
  </div>
</div>

<!-- Load world data from separate file -->
<script src="rooms.js"></script>

<script>
// =============================================================================
// SPAWN ROOMS — add or remove room IDs here to change where players can start
// =============================================================================
const SPAWN_ROOMS = [
  "the_bronze_anchor",
  "carnaby_market_square",
  "canal_steps",
  "wayfarers_garden",
  "harbour_promenade",
  "copper_lane",
  "temple_row_main",
  "embassy_row",
  "old_pier",
  "provisions_yard"
];

// =============================================================================
// DISTRICTS — display names and order for the MAP command
// The engine reads room lists directly from ROOMS, so just keep labels here
// =============================================================================
const DISTRICTS = {
  heights:     { label: "The Heights"             },
  rooftops:    { label: "The Rooftops"            },
  government:  { label: "Government District"     },
  residency:   { label: "The Residency"           },
  temples:     { label: "Temple District"         },
  carnaby:     { label: "Carnaby Market"          },
  old_quarter: { label: "The Old Quarter"         },
  harbour:     { label: "The Harbour"             },
  sewers:      { label: "The Sewers & Underworks" }
};

const DISTRICT_ORDER = [
  "heights", "rooftops", "government", "residency",
  "temples", "carnaby", "old_quarter", "harbour", "sewers"
];

// =============================================================================
// ENGINE — you should not need to edit anything below this line
// =============================================================================

const DIR_ALIASES = {
  "n": "n", "north": "n",
  "s": "s", "south": "s",
  "e": "e", "east":  "e",
  "w": "w", "west":  "w",
  "u": "u", "up":    "u",
  "d": "d", "down":  "d"
};

const DIR_LABELS = {
  "n": "North", "s": "South",
  "e": "East",  "w": "West",
  "u": "Up",    "d": "Down"
};

let currentRoom = null;
const output  = document.getElementById("output");
const input   = document.getElementById("cmdinput");
const locDisp = document.getElementById("location-display");

function randomFrom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function print(text, cls) {
  const el = document.createElement("div");
  el.className = "msg " + (cls || "");
  el.textContent = text;
  output.appendChild(el);
  output.scrollTop = output.scrollHeight;
}

function separator() {
  print("─────────────────────────────────────────────────", "msg-separator");
}

function showRoom(room) {
  separator();
  print(room.name, "msg-room-title");
  print(room.desc, "msg-room-desc");
  showExitsDetail(room);
}

function showExitsLine(room) {
  const dirs = Object.keys(room.exits);
  if (dirs.length === 0) { print("Exits: none", "msg-exits"); return; }
  print("Exits: " + dirs.map(d => DIR_LABELS[d]).join("  "), "msg-exits");
}

function showExitsDetail(room) {
  const dirs = Object.keys(room.exits);
  if (dirs.length === 0) { print("There are no obvious exits.", "msg-exits"); return; }
  print("Exits:", "msg-exits");
  for (const dir of dirs) {
    print("  " + DIR_LABELS[dir].toUpperCase() + " — " + room.exits[dir].desc, "msg-exit-detail");
  }
}

function showMap(districtKey) {
  const currentDistrict = ROOMS[currentRoom] ? ROOMS[currentRoom].district : null;

  // MAP [district] — list rooms in that district
  if (districtKey) {
    // fuzzy match: allow "harbour", "old quarter", "old_quarter" etc.
    const normalised = districtKey.replace(/\s+/g, "_").toLowerCase();
    const matchedKey = DISTRICT_ORDER.find(k => k === normalised || DISTRICTS[k].label.toLowerCase().replace(/\s+/g, "_") === normalised);

    if (!matchedKey) {
      print("Unknown district. Type MAP to see all districts.", "msg-error");
      return;
    }

    const d = DISTRICTS[matchedKey];
    separator();
    print(d.label.toUpperCase(), "msg-room-title");

    const rooms = Object.entries(ROOMS).filter(([, r]) => r.district === matchedKey);
    if (rooms.length === 0) {
      print("  No rooms found in this district.", "msg-exit-detail");
      return;
    }
    for (const [id, r] of rooms) {
      const isHere = id === currentRoom;
      print("  " + (isHere ? "* " : "  ") + r.name, isHere ? "msg-exits" : "msg-exit-detail");
    }
    return;
  }

  // MAP — list all districts
  separator();
  print("LUSK — DISTRICTS", "msg-room-title");
  print("Type MAP [district name] to see rooms within it.", "msg-system");
  for (const key of DISTRICT_ORDER) {
    const d = DISTRICTS[key];
    const isHere = key === currentDistrict;
    print("  " + (isHere ? "* " : "  ") + d.label, isHere ? "msg-exits" : "msg-exit-detail");
  }
}

function move(dir) {
  const room = ROOMS[currentRoom];
  if (!room.exits[dir]) { print("You cannot go that way.", "msg-error"); return; }
  const dest = room.exits[dir].to;
  if (!ROOMS[dest]) { print("That path leads nowhere yet.", "msg-error"); return; }
  currentRoom = dest;
  locDisp.textContent = ROOMS[currentRoom].name;
  showRoom(ROOMS[currentRoom]);
}

function handleCommand(raw) {
  const cmd = raw.trim().toLowerCase();
  if (!cmd) return;
  print("> " + raw, "msg-echo");

  if (DIR_ALIASES[cmd] !== undefined) { move(DIR_ALIASES[cmd]); return; }

  if (cmd === "look" || cmd === "l") { showRoom(ROOMS[currentRoom]); return; }

  if (cmd === "map" || cmd.startsWith("map ")) {
    const arg = cmd.startsWith("map ") ? cmd.slice(4).trim() : null;
    showMap(arg);
    return;
  }

  if (cmd === "exits" || cmd === "exit") { showExitsDetail(ROOMS[currentRoom]); return; }

  if (cmd === "help" || cmd === "?" || cmd === "commands") {
    separator();
    print("COMMANDS", "msg-room-title");
    print("  north / n     move north",     "msg-exit-detail");
    print("  south / s     move south",     "msg-exit-detail");
    print("  east  / e     move east",      "msg-exit-detail");
    print("  west  / w     move west",      "msg-exit-detail");
    print("  up    / u     move up",        "msg-exit-detail");
    print("  down  / d     move down",      "msg-exit-detail");
    print("  look  / l     look around",    "msg-exit-detail");
    print("  exits         detailed exits", "msg-exit-detail");
    print("  map              list districts",         "msg-exit-detail");
    print("  map [district]   list rooms in district", "msg-exit-detail");
    return;
  }

  print("Unknown command. Type HELP for a list of commands.", "msg-error");
}

function init() {
  currentRoom = randomFrom(SPAWN_ROOMS);
  locDisp.textContent = ROOMS[currentRoom].name;
  separator();
  print("LUSK", "msg-room-title");
  print("An island city. You are a stranger here.", "msg-room-desc");
  print("Type HELP for commands.", "msg-system");
  showRoom(ROOMS[currentRoom]);
  input.focus();
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const val = input.value;
    input.value = "";
    handleCommand(val);
  }
});

document.addEventListener("click", () => input.focus());

init();
</script>
</body>
</html>
